<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Houthandel Kaart — Vlaanderen + Wallonië</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <!-- Header -->
  <div id="header">
    <div class="header-left">
      <h1>🌲 Houthandel Kaart — Vlaanderen + Wallonië</h1>
      <p>Klik op een stip voor details · Filter per regio/categorie · Zoek op naam of plaats</p>
    </div>
    <div class="header-right">
      <div class="counter"><span id="counter-num">0</span> bedrijven</div>
    </div>
  </div>

  <!-- Controls: zoek + filters -->
  <div id="controls">
    <div class="search-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search" placeholder="Zoek bedrijf, plaats…" autocomplete="off"/>
      <button id="search-clear" title="Wis zoekopdracht">&times;</button>
    </div>
    <div class="divider"></div>
    <!-- Filterknoppen worden via JS toegevoegd -->
  </div>

  <!-- Kaart -->
  <div id="map"></div>

  <!-- Legenda -->
  <div id="legend">
    <button id="legend-toggle">▾ Legenda verbergen</button>
    <div id="legend-content">
      <!-- Wordt via JS opgebouwd -->
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="js/search.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
