<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Houthandel Kaart — Vlaanderen + Wallonië</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <!-- Header -->
  <div id="header">
    <div class="header-left">
      <h1>🌲 Houthandel Kaart — Vlaanderen + Wallonië</h1>
    </div>
    <div class="header-center">
      <button class="tab-btn active" data-tab="kaart">Kaart</button>
      <button class="tab-btn" data-tab="analyse">Analyse</button>
    </div>
    <div class="header-right">
      <div class="counter"><span id="counter-num">0</span> bedrijven</div>
    </div>
  </div>

  <!-- Controls: zoek + filters -->
  <div id="controls">
    <div class="controls-top">
      <div class="search-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search" placeholder="Zoek bedrijf, plaats…" autocomplete="off"/>
        <button id="search-clear" title="Wis zoekopdracht">&times;</button>
      </div>
      <button class="fb" id="btn-all">Alles</button>
    </div>
    <div class="filter-row" id="filter-regio"></div>
    <div class="filter-row" id="filter-activiteit"></div>
  </div>

  <!-- Kaart -->
  <div id="map"></div>

  <!-- Legenda -->
  <div id="legend">
    <button id="legend-toggle">▾ Legenda verbergen</button>
    <div id="legend-content">
      <!-- Wordt via JS opgebouwd -->
    </div>
  </div>

  <!-- Analyse tab -->
  <div id="analyse-view" class="hidden">
    <div class="analyse-toolbar">
      <div class="analyse-filters">
        <select id="analyse-regio">
          <option value="">Alle regio's</option>
        </select>
        <div id="analyse-activiteit-checks" class="analyse-act-checks">
          <!-- Wordt via JS opgebouwd -->
        </div>
        <select id="analyse-grootte">
          <option value="">Alle groottes</option>
          <option value="G">Groot</option>
          <option value="M">Middelgroot</option>
          <option value="K">Klein</option>
        </select>
        <label class="analyse-check"><input type="checkbox" id="analyse-groene-zone"> Groene zone</label>
        <label class="analyse-check"><input type="checkbox" id="analyse-btw-only"> Enkel met BTW</label>
      </div>
      <div class="analyse-actions">
        <button id="analyse-export" class="analyse-btn">📥 Exporteer CSV</button>
      </div>
    </div>

    <!-- Stats -->
    <div class="analyse-stats" id="analyse-stats"></div>

    <!-- Opportuniteiten -->
    <div class="analyse-opps" id="analyse-opps"></div>

    <!-- Tabel -->
    <div class="analyse-table-wrap">
      <table class="analyse-table" id="analyse-table">
        <thead>
          <tr>
            <th data-sort="naam">Naam ▾</th>
            <th data-sort="provincie">Regio</th>
            <th data-sort="activiteiten">Activiteit</th>
            <th data-sort="grootte">Grootte</th>
            <th data-sort="adres">Adres</th>
            <th data-sort="btw">BTW</th>
            <th data-sort="website">Website</th>
            <th data-sort="rijtijd_hertsberge">🚗 H</th>
            <th data-sort="rijtijd_drongen">🚗 D</th>
          </tr>
        </thead>
        <tbody id="analyse-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/map.js"></script>
  <script src="js/markers.js"></script>
  <script src="js/filters.js"></script>
  <script src="js/search.js"></script>
  <script src="js/analyse.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
