const map=L.map("map",{center:[50.80,4.20],zoom:8,zoomControl:true,scrollWheelZoom:true});
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
  attribution:'© <a href="https://openstreetmap.org/copyright">OpenStreetMap</a>',maxZoom:19
}).addTo(map);

// Drongen marker
L.circle([51.0334,3.6431],{radius:2500,color:"#8B1A1A",fillColor:"#8B1A1A",fillOpacity:.07,weight:2,dashArray:"7,4"}).addTo(map);
L.marker([51.0334,3.6431],{
  icon:L.divIcon({html:`<div style="background:#8B1A1A;color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;white-space:nowrap;box-shadow:0 1px 5px rgba(0,0,0,.3)">▼ Drongen</div>`,className:"",iconAnchor:[38,26]}),
  zIndexOffset:9999
}).addTo(map);

// Wallonië grens indicatie (lichte arcering via rectangle)
L.rectangle([[49.4,2.5],[50.75,6.4]],{color:"#880E4F",weight:0,fillColor:"#f0e6ec",fillOpacity:0.08}).addTo(map);

const SZ={G:13,M:9,K:6};
function mkIcon(col,r,isG){
  const s=r*2+8;
  const ring=isG?`<circle cx="${s/2}" cy="${s/2}" r="${r+4}" fill="none" stroke="${col}" stroke-width="1.5" opacity="0.28"/>`:"";
  return L.divIcon({
    html:`<svg xmlns="http://www.w3.org/2000/svg" width="${s}" height="${s}">${ring}<circle cx="${s/2}" cy="${s/2}" r="${r}" fill="${col}" stroke="white" stroke-width="1.8" opacity="0.93"/></svg>`,
    className:"",iconSize:[s,s],iconAnchor:[s/2,s/2]
  });
}

const provLbl={
  wvl:"West-Vlaanderen",ovl:"Oost-Vlaanderen",ant:"Antwerpen",
  vbr:"Vlaams-Brabant",lim:"Limburg",
  hai:"Henegouwen (Wallonië)",bwa:"Waals-Brabant (Wallonië)",nam:"Namen (Wallonië)",
  online:"Online",dhz:"DHZ-keten",agro:"Agro/Weide",import:"B2B Groothandel"
};
const sLbl={G:"⬛ GROTE / DOMINANTE SPELER",M:"▪ Middelgrote speler",K:"• Lokale speler"};

let markers=[],activeFilter="all";

function render(){
  markers.forEach(m=>map.removeLayer(m));markers=[];
  COMP.forEach(c=>{
    if(activeFilter!=="all"&&c.p!==activeFilter) return;
    const col=CC[c.p]||"#888";
    const r=SZ[c.s]||7;
    const icon=mkIcon(col,r,c.s==="G");
    const pop=`<span class="pb" style="background:${col}">${provLbl[c.p]||c.p}</span>
<span class="pn">${c.n}</span>
<span class="pl">📍 ${c.ll[0].toFixed(3)}, ${c.ll[1].toFixed(3)}</span>
<span class="pi">${c.i}</span>
<span class="pm">🌐 Webshop: <b>${c.w}</b></span>
<span class="pt ${c.s}">${sLbl[c.s]||"Lokale speler"}</span>`;
    const m=L.marker(c.ll,{icon}).addTo(map).bindPopup(pop,{maxWidth:290});
    markers.push(m);
  });
}

// ─── FILTERS ──────────────────────────────
const fbarEl=document.getElementById("controls");
function mkBtn(label,id,col){
  const b=document.createElement("button");
  b.className="fb"+(id==="all"?" on":"");
  if(id==="all"){b.style.background="#1a1a2e";b.style.color="#fff";b.style.borderColor="#1a1a2e";}
  b.textContent=label;
  b.onclick=()=>{
    activeFilter=id;
    document.querySelectorAll(".fb").forEach(x=>{x.classList.remove("on");x.style.background="";x.style.color="";x.style.borderColor="";});
    b.classList.add("on");
    if(col){b.style.background=col;b.style.color="#fff";b.style.borderColor=col;}
    else{b.style.background="#1a1a2e";b.style.color="#fff";b.style.borderColor="#1a1a2e";}
    render();
  };
  fbarEl.appendChild(b);
}
mkBtn("🗺 Alles","all",null);
CATS.forEach(c=>mkBtn(c.label,c.id,c.col));

// ─── LEGENDE ──────────────────────────────
const legEl=document.getElementById("legend");
CATS.forEach(c=>{
  const d=document.createElement("div");d.className="li";
  d.innerHTML=`<div class="ld" style="background:${c.col}"></div><span>${c.label}</span>`;
  legEl.appendChild(d);
});
const sz=document.createElement("div");sz.className="sz";
sz.innerHTML="<b>Grootte:</b>";
[{r:13,l:"Groot/dominant"},{r:9,l:"Middelgroot"},{r:6,l:"Lokaal/klein"}].forEach(s=>{
  const sp=document.createElement("span");sp.style.cssText="display:flex;align-items:center;gap:3px";
  sp.innerHTML=`<svg width="${s.r*2+4}" height="${s.r*2+4}"><circle cx="${s.r+2}" cy="${s.r+2}" r="${s.r}" fill="#888" opacity=".75"/></svg>${s.l}`;
  sz.appendChild(sp);
});
legEl.appendChild(sz);

render();
